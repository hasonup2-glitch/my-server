<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SE23 WEBRTC</title>
<link rel="icon" href="data:,">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;font-family:'Rajdhani', Arial, sans-serif;color:white;background:#000;
}

#chat::before{
  content:'23';
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Orbitron', sans-serif;
  font-size:40vw;
  font-weight:900;
  color:rgba(14,165,233,0.04);
  z-index:0;
  pointer-events:none;
}

#chat::after{
  content:'SOFTWARE ENGINEER';
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%, -50%) translateY(15vw);
  font-family:'Rajdhani', sans-serif;
  font-size:3vw;
  letter-spacing:1vw;
  color:rgba(14,165,233,0.06);
  z-index:0;
  pointer-events:none;
}

#login{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,0.9);backdrop-filter:blur(8px);z-index:10}
.box{padding:40px;border:1px solid #0ea5e9;border-radius:12px;text-align:center;background:rgba(11,18,32,0.8)}
.box h3{letter-spacing:2px;color:#0ea5e9;font-family:'Orbitron', sans-serif}
input,button{display:block;margin:10px auto;padding:12px;width:240px;border-radius:6px}
input{background:#111;color:white;border:1px solid #1e293b;text-align:center;outline:none;font-family:'Rajdhani', sans-serif}
input:focus{border-color:#0ea5e9}
button{background:#0ea5e9;border:none;cursor:pointer;color:white;font-weight:bold;transition:0.2s;font-family:'Rajdhani', sans-serif}
button:hover{background:#0284c7}

#app{display:flex;height:100vh}
#sidebar{width:240px;background:#000;border-right:1px solid #0ea5e9;display:flex;flex-direction:column;z-index:1}
#users-header{padding:15px;font-weight:bold;border-bottom:1px solid #0ea5e9;color:#0ea5e9;font-size:18px}
#users{flex:1;overflow:auto;padding:10px}
.user-tag{margin:6px 0;padding:10px 12px;background:#0a0a0a;border-radius:6px;border-left:3px solid #0ea5e9;position:relative;font-size:16px}
.speaking::after{content:'';position:absolute;right:8px;top:50%;transform:translateY(-50%);width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulse 1s infinite}

#chat{flex:1;display:flex;flex-direction:column;background:#000;position:relative}
#messages{flex:1;overflow:auto;padding:15px;z-index:1}
.msg{margin:8px 0;padding:8px 12px;background:#0b1220;border-radius:6px;border-left:3px solid #0ea5e9}

#controls{padding:10px;background:#000;border-top:1px solid #0ea5e9;display:flex;gap:10px;align-items:center;z-index:1}
#input{flex:1;padding:12px;background:#111;border:1px solid #1e293b;border-radius:6px;color:white;outline:none}
#input:focus{border-color:#0ea5e9}
#micBtn{width:auto;padding:12px 20px;display:flex;align-items:center;gap:8px}
#micBtn.active{background:#dc2626;animation:pulse 1.5s infinite}
#micBtn.active:hover{background:#b91c1c}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.7)}50%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
.dot{width:10px;height:10px;border-radius:50%;background:#4ade80}
.dot.off{background:#64748b}
.check{font-size:14px}
</style>
</head>

<body>
<div id="login">
  <div class="box">
    <h3>SOFTWARE ENGINEER 23</h3>
    <input id="pass" placeholder="Password">
    <button onclick="checkPass()">Next</button>
    <div id="nameBox" style="display:none;">
      <input id="name" placeholder="Name">
      <button onclick="enter()">Enter</button>
    </div>
    <div id="welcome"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <div id="sidebar">
    <div id="users-header">Connected Users</div>
    <div id="users"></div>
  </div>
  <div id="chat">
    <div id="messages"></div>
    <div id="controls">
      <input id="input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') send()">
      <button id="micBtn" onclick="toggleMic()">
        <span class="dot off" id="micDot"></span>
        <span id="micText">MIC</span>
        <span class="check">✓</span>
      </button>
    </div>
  </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
let socket;
let myName = "";
let myId = "";
let isMicOn = false;
let localStream;
const peerConnections = {};
const remoteAudio = document.getElementById('remoteAudio');

const rtcConfig = {
  iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
};

function checkPass(){
  const pass = document.getElementById("pass").value.trim();
  if(pass!== "soft 23"){
    alert("Wrong password");
    return;
  }
  document.getElementById("pass").style.display = "none";
  document.querySelector("#login button").style.display = "none";
  document.getElementById("nameBox").style.display = "block";
}

function enter(){
  const name = document.getElementById("name").value.trim();
  if(!name){
    alert("Enter name");
    return;
  }
  myName = name;
  document.getElementById("welcome").innerText = "Welcome " + name;
  setTimeout(() => {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";
    start();
  }, 800);
}

function start(){
  socket = io("http://localhost:3000");

  socket.on("connect", () => {
    myId = socket.id;
    socket.emit("join", myName);
  });

  socket.on("users", (users) => {
    renderUsers(users);
    users.forEach(user => {
      if(user.id!== myId &&!peerConnections[user.id]){
        createPeerConnection(user.id, true);
      }
    });
  });

  socket.on("user-joined", (user) => {
    if(user.id!== myId) createPeerConnection(user.id, false);
  });

  socket.on("msg", (d) => {
    if(d) addMsg(d.user, d.text);
  });

  socket.on("offer", async ({ from, offer }) => {
    const pc = peerConnections[from] || createPeerConnection(from, false);
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit("answer", { to: from, answer });
  });

  socket.on("answer", async ({ from, answer }) => {
    await peerConnections[from].setRemoteDescription(new RTCSessionDescription(answer));
  });

  socket.on("ice-candidate", async ({ from, candidate }) => {
    if(peerConnections[from]){
      await peerConnections[from].addIceCandidate(new RTCIceCandidate(candidate));
    }
  });

  socket.on("speaking", (user) => markSpeaking(user, true));
  socket.on("stopped_speaking", (user) => markSpeaking(user, false));
  socket.on("user-left", (id) => {
    if(peerConnections[id]){
      peerConnections[id].close();
      delete peerConnections[id];
    }
  });
}

function createPeerConnection(socketId, isInitiator){
  const pc = new RTCPeerConnection(rtcConfig);
  peerConnections[socketId] = pc;

  pc.onicecandidate = (e) => {
    if(e.candidate){
      socket.emit("ice-candidate", { to: socketId, candidate: e.candidate });
    }
  };

  pc.ontrack = (e) => {
    remoteAudio.srcObject = e.streams[0];
  };

  if(localStream){
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  if(isInitiator){
    pc.onnegotiationneeded = async () => {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit("offer", { to: socketId, offer });
    };
  }
  return pc;
}

function renderUsers(users){
  const box = document.getElementById("users");
  box.innerHTML = "";
  users.forEach((u,i) => {
    const you = u.id === myId? " (You)" : "";

    div.id = "user-" + u.name;
    div.innerText = (i+1) + ". " + u.name + you;
    box.appendChild(div);
  });
}

function markSpeaking(user, state){
  const el = document.getElementById(`user-${user}`);
  if(el) state? el.classList.add('speaking') : el.classList.remove('speaking');
}

function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;
  socket.emit("msg", text);
  addMsg(myName, text);
  input.value = "";
}

function addMsg(user,text){
  const div = document.createElement("div");
  div.className = "msg";

  const messages = document.getElementById("messages");
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function toggleMic(){
  if(!isMicOn){
    await startMic();
  } else {
    stopMic();
  }
}

async function startMic(){
  try{
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });

    Object.values(peerConnections).forEach(pc => {
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    });

    socket.emit("speaking", myName);
    isMicOn = true;
    document.getElementById("micBtn").classList.add("active");
    document.getElementById("micDot").classList.remove("off");
    document.getElementById("micText").innerText = "STOP";
    markSpeaking(myName, true);

  }catch(err){
    alert("المتصفح رفض المايك");
  }
}

function stopMic(){
  if(localStream){
    localStream.getTracks().forEach(track => track.stop());
    localStream = null;
  }
  Object.values(peerConnections).forEach(pc => {
    pc.getSenders().forEach(sender => pc.removeTrack(sender));
  });

  socket.emit("stopped_speaking", myName);
  isMicOn = false;
  document.getElementById("micBtn").classList.remove("active");
  document.getElementById("micDot").classList.add("off");
  document.getElementById("micText").innerText = "MIC";
  markSpeaking(myName, false);
}
</script>
</body>
</html>
